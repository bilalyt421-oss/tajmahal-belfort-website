<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taj Mahal Restaurant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
        }
        header {
            background-color: #9b5e4b;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav ul {
            list-style-type: none;
        }
        nav ul li {
            display: inline;
            margin: 0 15px;
        }
        .container {
            width: 80%;
            margin: auto;
        }
        .menu, .gallery {
            margin: 20px 0;
            padding: 20px;
            background: white;
            border-radius: 8px;
        }
        .contact-form {
            margin: 20px 0;
            padding: 20px;
            background: white;
            border-radius: 8px;
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #9b5e4b;
            color: white;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Taj Mahal Restaurant</h1>
        <nav>
            <ul>
                <li><a href="#menu">Menu</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <section id="menu" class="menu">
            <h2>Our Menu</h2>
            <p>Delicious dishes made with love and the finest ingredients.</p>
            <!-- Menu items can be added here -->
        </section>
        <section id="gallery" class="gallery">
            <h2>Gallery</h2>
            <p>Check out our delicious food!</p>
            <!-- Image gallery can be added here -->
        </section>
        <section id="contact" class="contact-form">
            <h2>Contact Us</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br>
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" required></textarea><br>
                <input type="submit" value="Submit">
            </form>
        </section>
    </div>
    <footer>
        <p>&copy; 2026 Taj Mahal Restaurant</p>
    </footer>
</body>
</html>
